<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f5;
      color: #1f2328;
      line-height: 1.6;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.1rem;
      color: #4b5563;
    }
    .card {
      background: white;
      border: 1px solid #d9dde3;
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }
    a {
      color: #1f5eff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Hello, I’m Your Name.</h1>
    <p>This is my personal website. I’ll use it to share my background, work, and contact details.</p>

    <section class="card">
      <h2>About me</h2>
      <p>Add a short introduction here.</p>
    </section>

    <section class="card">
      <h2>My work</h2>
      <p>Add a few lines about what you do or the projects you want to highlight.</p>
    </section>

    <section class="card">
      <h2>Contact</h2>
      <p>Email: <a href="mailto:you@example.com">you@example.com</a></p>
    </section>
  </main>
</body>
</html>
